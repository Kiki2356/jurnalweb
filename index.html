<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jurnal Pribadi</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
  <script>
    if (localStorage.getItem('jurnal_dark') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <link href="style.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f9fafb; --bg-card: #ffffff; --bg-tag: #e5e7eb; --bg-skeleton: #e5e7eb;
      --text-body: #111827; --text-muted: #6b7280; --text-content: #374151; --text-tag: #4b5563; --text-quiet: #9ca3af;
      --accent-primary: #2563eb; --accent-hover: #1d4ed8; --accent-link: #60a5fa;
      --border-card: #e5e7eb; --border-input: #d1d5db;
    }
    html.dark {
      --bg-body: #030712; --bg-card: #1f2937; --bg-tag: #374151; --bg-skeleton: #374151;
      --text-body: #f3f4f6; --text-muted: #9ca3af; --text-content: #d1d5db; --text-tag: #d1d5db; --text-quiet: #6b7280;
      --accent-primary: #2563eb; --accent-hover: #1d4ed8; --accent-link: #60a5fa;
      --border-card: #374151; --border-input: #4b5563;
    }
    article { content-visibility: auto; transition: background-color 0.2s, border-color 0.2s; }
    article { animation: fade-up 0.3s ease-out both; }
    article:nth-child(2) { animation-delay: 0.05s; }
    article:nth-child(3) { animation-delay: 0.1s; }
    article:nth-child(4) { animation-delay: 0.15s; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { article { animation: none; } }
    body { transition: background-color 0.2s, color 0.2s; }
    @keyframes vinyl-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .vinyl { animation: none; } }
    .vinyl {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #1a1a2e;
      position: relative;
      flex-shrink: 0;
      animation: vinyl-spin 4s linear infinite;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .vinyl::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.08);
    }
    .vinyl-cover {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #333;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .vinyl-hole {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f0f0f0;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
  <a href="#journal-list" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-white dark:focus:bg-gray-800 focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:text-blue-600 dark:focus:text-blue-400 focus:shadow-md">Langsung ke jurnal</a>

  <header class="max-w-2xl mx-auto pt-12 pb-6 px-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Jurnal Pribadi</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Catatan harian, sederhana <span class="text-gray-500">— oleh Kiki</span></p>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-dark" type="button" class="w-11 h-11 flex items-center justify-center rounded-lg border border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-lg" aria-label="Mode gelap" title="Mode gelap">🌙</button>
        <a href="tulis.html" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">+ Tulis Baru</a>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pb-24">
    <div id="journal-list" class="space-y-6">
    </div>
  </main>

  <footer class="max-w-2xl mx-auto px-4 pb-8 text-center text-sm text-gray-500 dark:text-gray-400">
    <p>dibuat dengan teks biasa &mdash; <span id="current-year"></span></p>
  </footer>

  <script>
    if (localStorage.getItem('jurnal_dark') === 'true') {
      document.documentElement.classList.add('dark');
    }

    (function () {
      var el = document.getElementById('current-year');
      el.textContent = new Date().getFullYear();
    })();

    var MOCK = [
      { title: 'Belajar Menulis Jurnal', date: '2026-07-16T14:30:00+07:00', tags: ['refleksi', 'mulai'], mood: '🔥', music: 'Hindia - Rumah ke Rumah', content: 'Hari ini aku mulai menulis jurnal digital. Rasanya aneh tapi menyenangkan. Semoga bisa konsisten mengisi tiap hari dengan catatan-catatan kecil yang bermakna. Bismillah.' },
      { title: 'Hujan Sore Ini', date: '2026-07-15T17:00:00+07:00', tags: ['harian', 'cuaca'], mood: '😌', music: '-', content: 'Hujan turun deras sore tadi. Aku duduk di teras sambil ngopi. Suara rintik hujan selalu bikin pikiran lebih tenang. Momen-momen kecil seperti ini yang ingin aku simpan.' },
      { title: 'Kopi Pagi dan Ide Baru', date: '2026-07-14T08:15:00+07:00', tags: ['ide', 'pagi'], mood: '🤔', music: '-', content: 'Pagi ini dapat ide proyek baru sambil nyeruput kopi tubruk. Kayaknya menarik buat dikerjain akhir pekan nanti. Catat dulu biar nggak lupa.' }
    ];

    function relatifWaktu(dateStr) {
      try {
        var lalu = new Date(dateStr).getTime();
        var sekarang = Date.now();
        var selisih = Math.floor((sekarang - lalu) / 1000);

        if (selisih < 0) return 'baru saja';
        if (selisih < 60) return selisih + ' detik yang lalu';
        if (selisih < 3600) return Math.floor(selisih / 60) + ' menit yang lalu';
        if (selisih < 86400) return Math.floor(selisih / 3600) + ' jam yang lalu';
        if (selisih < 604800) return Math.floor(selisih / 86400) + ' hari yang lalu';
        if (selisih < 2592000) return Math.floor(selisih / 604800) + ' minggu yang lalu';
        return Math.floor(selisih / 2592000) + ' bulan yang lalu';
      } catch (e) {
        console.error('Gagal format waktu: ' + e.message);
        return 'waktu tidak diketahui';
      }
    }

    function b64KeUtf8(b64) {
      try {
        return new TextDecoder().decode(Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0); }));
      } catch (e) {
        return decodeURIComponent(escape(atob(b64)));
      }
    }

    function parseFrontmatter(raw) {
      var result = { title: 'Tanpa Judul', date: new Date().toISOString(), tags: [], mood: '', music: '', album_art: '', image: '', content: raw };
      try {
        var match = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        if (!match) return result;
        var header = match[1];
        var body = match[2];
        var lines = header.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          var kv = line.split(/:\s*(.+)/);
          var key = kv[0].trim();
          var val = (kv[1] || '').trim();
          if (key === 'title') {
            result.title = val.replace(/^["']|["']$/g, '');
          } else if (key === 'date') {
            result.date = val.replace(/^["']|["']$/g, '');
          } else if (key === 'tags') {
            try { result.tags = JSON.parse(val); } catch (e) { result.tags = []; }
          } else if (key === 'mood') {
            result.mood = val.replace(/^["']|["']$/g, '');
          } else if (key === 'music') {
            result.music = val.replace(/^["']|["']$/g, '');
          } else if (key === 'album_art') {
            result.album_art = val.replace(/^["']|["']$/g, '');
          } else if (key === 'image') {
            result.image = val.replace(/^["']|["']$/g, '');
          }
        }
        result.content = body.trim();
      } catch (e) {
        /* ponytail: fall through to raw content */
      }
      return result;
    }

    function gelapAktif() {
      return localStorage.getItem('jurnal_dark') === 'true';
    }

    function renderDaftar(data) {
      var wadah = document.getElementById('journal-list');

      try {
        data.sort(function (a, b) {
          return new Date(b.date).getTime() - new Date(a.date).getTime();
        });

        var html = '';
        data.forEach(function (j) {
          var truncated = j.content.length > 120;
          var excerpt = truncated ? j.content.slice(0, 120) + '...' : j.content;
          var tagsHtml = (j.tags || []).map(function (t) {
            return '<button type="button" class="tag-filter text-xs bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" data-tag="' + t + '">#' + t + '</button>';
          }).join(' ');

          var moodShow = j.mood && j.mood !== '-' ? '<span class="text-lg" title="Mood">' + j.mood + '</span>' : '';
          var musikShow = '';
          if (j.music && j.music !== '-') {
            var coverHtml = '';
            if (j.album_art && j.album_art !== '-') {
              coverHtml = '<div class="vinyl"><div class="vinyl-cover" style="background-image:url(' + j.album_art.replace(/"/g, '&quot;') + ')"></div><div class="vinyl-hole"></div></div>';
            }
            musikShow = coverHtml + '<span class="text-xs text-gray-500 dark:text-gray-400 truncate">' + j.music + '</span>';
          }
          if (moodShow || musikShow) {
            ekstra = '<div class="flex items-center gap-3 mt-1">' + moodShow + musikShow + '</div>';
          }

          var adaGambar = j.image && j.image !== '-';
          var gambarHtml = adaGambar ? '<img src="' + j.image + '" class="w-full max-h-64 object-cover rounded-lg mt-3 mb-4" loading="lazy">' : '';
          var contentMt = adaGambar ? '' : 'mt-3';

          html +=
            '<article class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-5 shadow-sm">' +
              '<h2 class="text-lg font-semibold leading-snug">' + j.title + '</h2>' +
              '<div class="flex items-center gap-2 mt-1 text-sm text-gray-500 dark:text-gray-400">' +
                '<time datetime="' + j.date + '">' + relatifWaktu(j.date) + '</time>' +
                (tagsHtml ? '<span>&middot;</span>' + tagsHtml : '') +
              '</div>' +
              gambarHtml +
              '<div class="' + contentMt + ' text-gray-700 dark:text-gray-300 leading-relaxed max-w-[65ch]">' +
                '<p class="excerpt text-pretty">' + excerpt + '</p>' +
                (truncated ? '<p class="full hidden">' + j.content + '</p>' : '') +
              '</div>' +
              (ekstra ? '<div class="mt-4 flex items-center gap-3">' + moodShow + musikShow + '</div>' : '') +
              (truncated ? '<button type="button" class="read-more text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 text-sm mt-2">Baca selengkapnya</button>' : '') +
            '</article>';
        });

        var tagBar = _tagAktif
          ? '<div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-4">' +
              'Filter: <span class="text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded">#' + _tagAktif + '</span>' +
              '<button type="button" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 underline text-xs" id="hapus-filter">Hapus filter</button>' +
            '</div>'
          : '';

        wadah.innerHTML = tagBar + (html || '<p class="text-gray-500 dark:text-gray-400 text-center py-12">' + (_tagAktif
          ? 'Tidak ada jurnal dengan tag <span class="text-xs bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded">#' + _tagAktif + '</span>. <button type="button" class="underline text-blue-500 dark:text-blue-400 hover:text-blue-700" id="hapus-filter">Tampilkan semua</button>'
          : 'Belum ada jurnal. Mulai dari <a href="tulis.html" class="underline text-blue-500 dark:text-blue-400">tulis.html</a>') + '</p>');
      } catch (e) {
        console.error('Gagal render: ' + e.message);
      }
    }

    function ambilDariApi(repo, token) {
      var headers = token ? { 'Authorization': 'token ' + token } : {};
      var url = 'https://api.github.com/repos/' + repo + '/contents/journals/';

      fetch(url, { headers: headers })
        .then(function (res) {
          if (!res.ok) throw new Error('Gagal membaca direktori journals (HTTP ' + res.status + ')');
          return res.json();
        })
        .then(function (files) {
          if (!Array.isArray(files) || files.length === 0) {
            renderDaftar([]);
            return;
          }

          var mdFiles = files.filter(function (f) { return f.name.endsWith('.md'); });
          var promises = mdFiles.map(function (f) {
            return fetch(f.url, { headers: headers })
              .then(function (r) {
                if (!r.ok) throw new Error('Gagal mengambil ' + f.name);
                return r.json();
              })
              .then(function (content) {
                var raw = b64KeUtf8(content.content);
                return parseFrontmatter(raw);
              });
          });

          return Promise.all(promises);
        })
        .then(function (data) {
          if (data) {
            simpanData(data);
            renderDaftar(data);
          }
        })
        .catch(function (err) {
          console.error('API gagal, fallback ke data lokal: ' + err.message);
          simpanData(MOCK);
          renderDaftar(MOCK);
          if (repo) {
            document.getElementById('journal-list').insertAdjacentHTML('afterbegin',
              '<p class="text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded p-3 text-sm mb-4">Gagal memuat jurnal dari GitHub. Menampilkan data lokal sebagai gantinya.</p>');
          }
        });
    }

    function muatJurnal() {
      var repo = localStorage.getItem('jurnal_gh_repo');
      var token = localStorage.getItem('jurnal_gh_token');
      var wadah = document.getElementById('journal-list');
      wadah.innerHTML =
        '<div class="animate-pulse space-y-6">' +
          '<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-5"><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-3"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/4 mb-3"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-5/6"></div></div>' +
          '<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-5"><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-3"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/4 mb-3"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-5/6"></div></div>' +
        '</div>';

      if (repo) {
        ambilDariApi(repo, token || undefined);
      } else {
        simpanData(MOCK);
        renderDaftar(MOCK);
      }
    }

    var _jurnalData = [];
    var _tagAktif = '';

    function simpanData(data) {
      _jurnalData = data;
    }

    function filterByTag(tag) {
      _tagAktif = _tagAktif === tag ? '' : tag;
      if (_tagAktif) {
        renderDaftar(_jurnalData.filter(function (j) {
          return j.tags && j.tags.indexOf(_tagAktif) !== -1;
        }));
      } else {
        renderDaftar(_jurnalData);
      }
    }

    muatJurnal();

    (function () {
      var html = document.documentElement;
      var btn = document.getElementById('btn-dark');

      if (gelapAktif()) {
        html.classList.add('dark');
        btn.textContent = '☀️'; btn.title = 'Mode terang';
        btn.setAttribute('aria-label', 'Mode terang');
      }

      btn.addEventListener('click', function () {
        var aktif = !gelapAktif();
        localStorage.setItem('jurnal_dark', aktif);
        html.classList.toggle('dark', aktif);
        btn.textContent = aktif ? '☀️' : '🌙';
        btn.title = aktif ? 'Mode terang' : 'Mode gelap';
        btn.setAttribute('aria-label', aktif ? 'Mode terang' : 'Mode gelap');
      });
    })();

    document.getElementById('journal-list').addEventListener('click', function (e) {
      var tagBtn = e.target.closest('.tag-filter');
      if (tagBtn) {
        filterByTag(tagBtn.dataset.tag);
        return;
      }

      if (e.target.id === 'hapus-filter') {
        filterByTag(_tagAktif);
        return;
      }

      var btn = e.target.closest('.read-more');
      if (!btn) return;
      var article = btn.closest('article');
      var excerpt = article.querySelector('.excerpt');
      var full = article.querySelector('.full');
      var expanding = full.classList.contains('hidden');
      if (expanding) {
        excerpt.classList.add('hidden');
        full.classList.remove('hidden');
        btn.textContent = 'Ringkas';
      } else {
        full.classList.add('hidden');
        excerpt.classList.remove('hidden');
        btn.textContent = 'Baca selengkapnya';
      }
      btn.setAttribute('aria-expanded', String(expanding));
    });
  </script>

</body>
</html>
