<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jurnal Pribadi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <header class="max-w-2xl mx-auto pt-12 pb-6 px-4">
    <h1 class="text-3xl font-bold tracking-tight">Jurnal Pribadi</h1>
    <p class="text-gray-500 mt-1">Catatan harian, sederhana.</p>
  </header>

  <main class="max-w-2xl mx-auto px-4 pb-24">
    <div id="journal-list" class="space-y-6">
    </div>
  </main>

  <footer class="max-w-2xl mx-auto px-4 pb-8 text-center text-sm text-gray-400">
    <p>dibuat dengan teks biasa &mdash; <span id="current-year"></span></p>
  </footer>

  <script>
    (function () {
      var el = document.getElementById('current-year');
      el.textContent = new Date().getFullYear();
    })();

    var journals = [
      {
        id: '2026-07-16-belajar',
        title: 'Belajar Menulis Jurnal',
        date: '2026-07-16T14:30:00+07:00',
        tags: ['refleksi', 'mulai'],
        content: 'Hari ini aku mulai menulis jurnal digital. Rasanya aneh tapi menyenangkan. Semoga bisa konsisten mengisi tiap hari dengan catatan-catatan kecil yang bermakna. Bismillah.'
      },
      {
        id: '2026-07-15-hujan',
        title: 'Hujan Sore Ini',
        date: '2026-07-15T17:00:00+07:00',
        tags: ['harian', 'cuaca'],
        content: 'Hujan turun deras sore tadi. Aku duduk di teras sambil ngopi. Suara rintik hujan selalu bikin pikiran lebih tenang. Momen-momen kecil seperti ini yang ingin aku simpan.'
      },
      {
        id: '2026-07-14-kopi',
        title: 'Kopi Pagi dan Ide Baru',
        date: '2026-07-14T08:15:00+07:00',
        tags: ['ide', 'pagi'],
        content: 'Pagi ini dapat ide proyek baru sambil nyeruput kopi tubruk. Kayaknya menarik buat dikerjain akhir pekan nanti. Catat dulu biar nggak lupa.'
      }
    ];

    function relatifWaktu(dateStr) {
      try {
        var lalu = new Date(dateStr).getTime();
        var sekarang = Date.now();
        var selisih = Math.floor((sekarang - lalu) / 1000);

        if (selisih < 0) return 'baru saja';
        if (selisih < 60) return selisih + ' detik yang lalu';
        if (selisih < 3600) return Math.floor(selisih / 60) + ' menit yang lalu';
        if (selisih < 86400) return Math.floor(selisih / 3600) + ' jam yang lalu';
        if (selisih < 604800) return Math.floor(selisih / 86400) + ' hari yang lalu';
        if (selisih < 2592000) return Math.floor(selisih / 604800) + ' minggu yang lalu';
        return Math.floor(selisih / 2592000) + ' bulan yang lalu';
      } catch (e) {
        console.error('Gagal format waktu: ' + e.message);
        return 'waktu tidak diketahui';
      }
    }

    function muatJurnal() {
      var wadah = document.getElementById('journal-list');

      try {
        journals.sort(function (a, b) {
          return new Date(b.date).getTime() - new Date(a.date).getTime();
        });

        var html = '';
        journals.forEach(function (j) {
          var excerpt = j.content.length > 120
            ? j.content.slice(0, 120) + '...'
            : j.content;
          var tagsHtml = j.tags.map(function (t) {
            return '<span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded">#' + t + '</span>';
          }).join(' ');

          html +=
            '<article class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm">' +
              '<h2 class="text-lg font-semibold leading-snug">' + j.title + '</h2>' +
              '<div class="flex items-center gap-2 mt-1 text-sm text-gray-500">' +
                '<time datetime="' + j.date + '">' + relatifWaktu(j.date) + '</time>' +
                '<span>&middot;</span>' +
                tagsHtml +
              '</div>' +
              '<p class="mt-3 text-gray-700 leading-relaxed">' + excerpt + '</p>' +
            '</article>';
        });

        wadah.innerHTML = html;
      } catch (e) {
        wadah.innerHTML =
          '<p class="text-red-500 bg-red-50 border border-red-200 rounded p-4">' +
            'Gagal memuat jurnal: ' + e.message +
          '</p>';
        console.error('Gagal memuat jurnal: ' + e.message);
      }
    }

    muatJurnal();
  </script>

</body>
</html>
