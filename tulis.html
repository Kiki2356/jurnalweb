<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulis Jurnal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <main class="max-w-2xl mx-auto pt-12 pb-24 px-4">
    <h1 class="text-2xl font-bold tracking-tight mb-1">Tulis Jurnal Baru</h1>
    <p class="text-sm text-gray-400 mb-6 flex items-center gap-3">
      <a href="index.html" class="hover:text-gray-600">&larr; Beranda</a>
      <span>&middot;</span>
      <button id="btn-ganti-konfig" type="button" class="underline hover:text-gray-600">Ganti konfigurasi</button>
    </p>

    <form id="form-jurnal" class="space-y-4">
      <div>
        <label for="judul" class="block text-sm font-medium text-gray-600 mb-1">
          Judul <span class="text-gray-400 font-normal">(opsional — kosongkan untuk judul otomatis)</span>
        </label>
        <input
          id="judul"
          type="text"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
          placeholder="Judul jurnal..."
        >
      </div>

      <div>
        <label for="isi" class="block text-sm font-medium text-gray-600 mb-1">Isi Jurnal</label>
        <textarea
          id="isi"
          rows="16"
          autofocus
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent resize-y"
          placeholder="Tulis isi jurnalmu di sini..."
        ></textarea>
      </div>

      <hr class="border-gray-200 my-2">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Suasana</p>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Mood</label>
        <div id="mood-picker" class="flex gap-2">
          <button type="button" data-mood="😊" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Senang">😊</button>
          <button type="button" data-mood="😌" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Tenang">😌</button>
          <button type="button" data-mood="🥰" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Sayang">🥰</button>
          <button type="button" data-mood="😢" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Sedih">😢</button>
          <button type="button" data-mood="😡" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Kesal">😡</button>
          <button type="button" data-mood="😴" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Capek">😴</button>
          <button type="button" data-mood="🤔" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Mikir">🤔</button>
          <button type="button" data-mood="🔥" class="mood-btn text-xl w-10 h-10 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-colors" title="Semangat">🔥</button>
        </div>
        <input type="hidden" id="mood" value="">
      </div>

      <div>
        <label for="cari-lagu" class="block text-sm font-medium text-gray-600 mb-1">Musik <span class="text-gray-400 font-normal">(opsional — cari lagu)</span></label>
        <div class="relative">
          <input
            id="cari-lagu"
            type="text"
            autocomplete="off"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
            placeholder="Cari lagu atau artis..."
          >
          <div id="hasil-cari" class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-10 hidden max-h-60 overflow-y-auto"></div>
        </div>
        <input type="hidden" id="lagu" value="">
        <input type="hidden" id="album-art" value="">
        <div id="lagu-terpilih" class="hidden mt-2 flex items-center gap-2 bg-gray-100 rounded-lg px-3 py-2 text-sm">
          <span id="preview-cover" class="w-10 h-10 rounded-full bg-gray-300 bg-cover bg-center flex-shrink-0"></span>
          <span id="preview-teks" class="text-gray-700 truncate"></span>
          <button id="hapus-lagu" type="button" class="ml-auto text-gray-400 hover:text-red-500 text-lg leading-none">&times;</button>
        </div>
      </div>

      <hr class="border-gray-200 my-2">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Lampiran</p>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Gambar <span class="text-gray-400 font-normal">(opsional)</span></label>
        <div class="flex gap-2">
          <label class="flex-1 flex items-center justify-center gap-2 px-4 py-3 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-400 text-sm text-gray-500">
            <span id="label-gambar">+ Galeri</span>
            <input id="input-gambar" type="file" accept="image/*" class="sr-only">
          </label>
          <label class="flex items-center justify-center gap-2 px-4 py-3 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-400 text-sm text-gray-500">
            <span>📷 Kamera</span>
            <input id="input-kamera" type="file" accept="image/*" capture="environment" class="sr-only">
          </label>
        </div>
        <div id="preview-gambar" class="hidden mt-2 relative">
          <img id="img-preview" class="max-h-48 rounded-lg object-cover" alt="">
          <button id="hapus-gambar" type="button" class="absolute top-1 right-1 bg-white/90 text-gray-600 hover:text-red-500 rounded-full w-6 h-6 flex items-center justify-center text-sm shadow">&times;</button>
        </div>
        <input type="hidden" id="gambar-url" value="">
      </div>

      <div class="flex gap-2">
        <button
          id="btn-simpan"
          type="submit"
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg text-sm transition-colors"
        >
          Simpan Jurnal
        </button>
        <button
          id="btn-mic"
          type="button"
          class="w-12 h-[46px] flex items-center justify-center rounded-lg border border-gray-300 text-gray-500 hover:bg-gray-100 transition-colors text-xl disabled:opacity-30 disabled:cursor-not-allowed"
          title="Voice to text"
          aria-label="Voice to text"
          disabled
        >🎤</button>
      </div>
    </form>

    <div id="feedback" class="mt-4"></div>
  </main>

  <div id="modal-konfig" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
      <h2 class="text-lg font-semibold mb-4">Konfigurasi GitHub</h2>
      <p class="text-sm text-gray-500 mb-4">Masukkan token dan repo untuk mulai menyimpan jurnal.</p>
      <form id="form-konfig" class="space-y-3">
        <div>
          <label for="gh-token" class="block text-sm font-medium text-gray-600 mb-1">Personal Access Token</label>
          <input id="gh-token" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" placeholder="ghp_..." required>
        </div>
        <div>
          <label for="gh-repo" class="block text-sm font-medium text-gray-600 mb-1">Repository <span class="text-gray-400 font-normal">(format: username/nama-repo)</span></label>
          <input id="gh-repo" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" placeholder="user-anda/nama-repo" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">Simpan Konfigurasi</button>
      </form>
      <p id="modal-error" class="text-red-600 text-sm mt-3 hidden"></p>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('form-jurnal');
      var judul = document.getElementById('judul');
      var isi = document.getElementById('isi');
      var feedback = document.getElementById('feedback');
      var modal = document.getElementById('modal-konfig');
      var formKonfig = document.getElementById('form-konfig');
      var inpToken = document.getElementById('gh-token');
      var inpRepo = document.getElementById('gh-repo');
      var modalError = document.getElementById('modal-error');
      var btnGanti = document.getElementById('btn-ganti-konfig');
      var inpMood = document.getElementById('mood');
      var inpLagu = document.getElementById('lagu');
      var inpAlbumArt = document.getElementById('album-art');
      var inpCariLagu = document.getElementById('cari-lagu');
      var hasilCari = document.getElementById('hasil-cari');
      var laguTerpilih = document.getElementById('lagu-terpilih');
      var previewCover = document.getElementById('preview-cover');
      var previewTeks = document.getElementById('preview-teks');
      var btnHapusLagu = document.getElementById('hapus-lagu');
      var inputGambar = document.getElementById('input-gambar');
      var inputKamera = document.getElementById('input-kamera');
      var previewGambar = document.getElementById('preview-gambar');
      var imgPreview = document.getElementById('img-preview');
      var hapusGambar = document.getElementById('hapus-gambar');
      var gambarUrl = document.getElementById('gambar-url');
      var labelGambar = document.getElementById('label-gambar');

      var moodAktif = '';
      var timerCari = null;

      document.querySelectorAll('.mood-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.mood-btn').forEach(function (b) {
            b.classList.remove('border-blue-400', 'bg-blue-50', 'ring-2', 'ring-blue-300');
          });
          btn.classList.add('border-blue-400', 'bg-blue-50', 'ring-2', 'ring-blue-300');
          moodAktif = btn.dataset.mood;
          inpMood.value = moodAktif;
        });
      });

      function pilihLagu(data) {
        inpLagu.value = data.artist.name + ' - ' + data.title;
        inpAlbumArt.value = data.album.cover_medium;
        previewTeks.textContent = data.artist.name + ' - ' + data.title;
        previewCover.style.backgroundImage = 'url(' + data.album.cover_small + ')';
        laguTerpilih.classList.remove('hidden');
        hasilCari.classList.add('hidden');
        inpCariLagu.value = data.artist.name + ' - ' + data.title;
      }

      function resetLagu() {
        inpLagu.value = '';
        inpAlbumArt.value = '';
        inpCariLagu.value = '';
        laguTerpilih.classList.add('hidden');
        previewCover.style.backgroundImage = '';
        previewTeks.textContent = '';
      }

      btnHapusLagu.addEventListener('click', resetLagu);

      function bacaFile(fileInput) {
        return function () {
          var file = fileInput.files[0];
          if (!file) return;
          try {
            var reader = new FileReader();
            reader.onload = function (e) {
              imgPreview.src = e.target.result;
              previewGambar.classList.remove('hidden');
              labelGambar.textContent = file.name;
              gambarUrl.value = e.target.result;
            };
            reader.readAsDataURL(file);
          } catch (err) {
            console.error('Gagal baca gambar:', err);
          }
        };
      }

      inputGambar.addEventListener('change', bacaFile(inputGambar));
      inputKamera.addEventListener('change', bacaFile(inputKamera));

      hapusGambar.addEventListener('click', function () {
        inputGambar.value = '';
        inputKamera.value = '';
        previewGambar.classList.add('hidden');
        imgPreview.src = '';
        gambarUrl.value = '';
        labelGambar.textContent = '+ Galeri';
      });

      inpCariLagu.addEventListener('input', function () {
        clearTimeout(timerCari);
        var q = this.value.trim();
        if (!q) { hasilCari.classList.add('hidden'); return; }
        timerCari = setTimeout(function () {
          try {
            fetch('/.netlify/functions/deezer?q=' + encodeURIComponent(q))
              .then(function (r) { return r.json(); })
              .then(function (res) {
                if (!res.data || !res.data.length) {
                  hasilCari.innerHTML = '<p class="px-3 py-2 text-sm text-gray-400">Tidak ditemukan</p>';
                  hasilCari.classList.remove('hidden');
                  return;
                }
                var html = '';
                res.data.slice(0, 6).forEach(function (item) {
                  html +=
                    '<button type="button" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-blue-50 text-left text-sm border-b border-gray-100 last:border-0">' +
                      '<img src="' + item.album.cover_small + '" class="w-10 h-10 rounded object-cover" alt="" loading="lazy">' +
                      '<div class="truncate">' +
                        '<span class="font-medium text-gray-800 block truncate">' + item.title + '</span>' +
                        '<span class="text-xs text-gray-500">' + item.artist.name + '</span>' +
                      '</div>' +
                    '</button>';
                });
                hasilCari.innerHTML = html;
                hasilCari.classList.remove('hidden');

                hasilCari.querySelectorAll('button').forEach(function (btn, i) {
                  btn.addEventListener('click', function () { pilihLagu(res.data[i]); });
                });
              });
          } catch (e) {
            console.error('Search gagal:', e);
          }
        }, 300);
      });

      document.addEventListener('click', function (e) {
        if (!hasilCari.contains(e.target) && e.target !== inpCariLagu) {
          hasilCari.classList.add('hidden');
        }
      });

      var STORAGE_TOKEN = 'jurnal_gh_token';
      var STORAGE_REPO = 'jurnal_gh_repo';

      function konfigAda() {
        return !!(localStorage.getItem(STORAGE_TOKEN) && localStorage.getItem(STORAGE_REPO));
      }

      function tampilkanModal() {
        inpToken.value = localStorage.getItem(STORAGE_TOKEN) || '';
        inpRepo.value = localStorage.getItem(STORAGE_REPO) || '';
        modalError.classList.add('hidden');
        modal.classList.remove('hidden');
        inpToken.focus();
      }

      function sembunyikanModal() {
        modal.classList.add('hidden');
      }

      if (!konfigAda()) {
        tampilkanModal();
      }

      btnGanti.addEventListener('click', function () {
        tampilkanModal();
      });

      formKonfig.addEventListener('submit', function (e) {
        e.preventDefault();
        try {
          var token = inpToken.value.trim();
          var repo = inpRepo.value.trim();

          if (!token || !repo) {
            modalError.textContent = 'Token dan repo wajib diisi.';
            modalError.classList.remove('hidden');
            return;
          }

          if (repo.indexOf('/') === -1) {
            modalError.textContent = 'Format repo harus username/nama-repo (contoh: alice/catatanku).';
            modalError.classList.remove('hidden');
            return;
          }

          localStorage.setItem(STORAGE_TOKEN, token);
          localStorage.setItem(STORAGE_REPO, repo);
          sembunyikanModal();
        } catch (err) {
          modalError.textContent = 'Gagal: ' + err.message;
          modalError.classList.remove('hidden');
        }
      });

      function ambilLimaKata(teks) {
        return teks.trim().split(/\s+/).slice(0, 5).join(' ');
      }

      function pad(n) {
        return n < 10 ? '0' + n : '' + n;
      }

      function namaFile() {
        var d = new Date();
        return d.getFullYear() + '-' +
          pad(d.getMonth() + 1) + '-' +
          pad(d.getDate()) + '-' +
          pad(d.getHours()) +
          pad(d.getMinutes()) +
          pad(d.getSeconds()) + '.md';
      }

      function simpanJurnal(e) {
        e.preventDefault();

        try {
          if (!konfigAda()) {
            tampilkanModal();
            feedback.innerHTML =
              '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Konfigurasi GitHub belum diisi. Silakan isi token dan repo terlebih dahulu.</p>';
            return;
          }

          var isiMentah = isi.value.trim();
          if (!isiMentah) {
            feedback.innerHTML =
              '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Isi jurnal tidak boleh kosong.</p>';
            return;
          }

          var token = localStorage.getItem(STORAGE_TOKEN);
          var repo = localStorage.getItem(STORAGE_REPO);
          var judulFinal = judul.value.trim() || ambilLimaKata(isiMentah);
          var sekarang = new Date();
          var tanggalIso = sekarang.toISOString();
          var fileNama = namaFile();
          var gambarDataUrl = gambarUrl.value.trim();
          var btn = document.getElementById('btn-simpan');

          btn.disabled = true;
          btn.textContent = 'Menyimpan...';

          function langkah(teks) {
            btn.textContent = teks;
            feedback.innerHTML = '<p class="text-blue-600 bg-blue-50 border border-blue-200 rounded p-3 text-sm">' + teks + '</p>';
          }

          function sukses(fn) {
            feedback.innerHTML = '<p class="text-green-700 bg-green-50 border border-green-200 rounded p-3 text-sm">Jurnal tersimpan ke GitHub: <code>' + fn + '</code></p>';
            judul.value = '';
            isi.value = '';
            inpMood.value = '';
            gambarUrl.value = '';
            inputGambar.value = '';
            inputKamera.value = '';
            previewGambar.classList.add('hidden');
            labelGambar.textContent = '+ Galeri';
            resetLagu();
            moodAktif = '';
            document.querySelectorAll('.mood-btn').forEach(function (b) { b.classList.remove('border-blue-400', 'bg-blue-50', 'ring-2', 'ring-blue-300'); });
            btn.disabled = false;
            btn.textContent = 'Simpan Jurnal';
            isi.focus();
          }

          function gagal(err) {
            feedback.innerHTML = '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Gagal: ' + err.message + '</p>';
            console.error('Gagal simpan jurnal: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'Simpan Jurnal';
          }

          function simpanJurnalKeGit(ext, mdContent) {
            return fetch('https://api.github.com/repos/' + repo + '/contents/journals/' + ext, {
              method: 'PUT',
              headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: 'jurnal: ' + judulFinal, content: btoa(unescape(encodeURIComponent(mdContent))), branch: 'main' })
            }).then(function (r) {
              if (!r.ok) return r.json().then(function (d) { throw new Error(d.message || 'HTTP ' + r.status); });
              return r.json();
            });
          }

          if (gambarDataUrl.startsWith('data:')) {
            var imgExt = gambarDataUrl.match(/^data:image\/(\w+);/);
            if (!imgExt) throw new Error('Format gambar tidak dikenal');
            imgExt = imgExt[1] === 'jpeg' ? 'jpg' : imgExt[1];
            var imgFileName = namaFile().slice(0, -3) + '.' + imgExt;
            var imgB64 = gambarDataUrl.split(',')[1];

            langkah('Mengunggah gambar...');

            fetch('https://api.github.com/repos/' + repo + '/contents/journals/images/' + imgFileName, {
              method: 'PUT',
              headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: 'gambar: ' + imgFileName, content: imgB64, branch: 'main' })
            })
            .then(function (r) {
              if (!r.ok) return r.json().then(function (d) { throw new Error('Gagal upload gambar: ' + (d.message || 'HTTP ' + r.status)); });
              return r.json();
            })
            .then(function () {
              langkah('Menyimpan jurnal...');
              var rawUrl = 'https://raw.githubusercontent.com/' + repo + '/main/journals/images/' + imgFileName;
              var md =
                '---\n' +
                'title: "' + judulFinal + '"\n' +
                'date: ' + tanggalIso + '\n' +
                'tags: []\n' +
                'mood: "' + (inpMood.value || '-') + '"\n' +
                'music: "' + (inpLagu.value.trim() || '-') + '"\n' +
                'album_art: "' + (inpAlbumArt.value.trim() || '-') + '"\n' +
                'image: "' + rawUrl + '"\n' +
                '---\n\n' +
                isiMentah;
              return simpanJurnalKeGit(fileNama, md);
            })
            .then(function () { sukses(fileNama); })
            .catch(function (err) { gagal(err); });

          } else {
            var md =
              '---\n' +
              'title: "' + judulFinal + '"\n' +
              'date: ' + tanggalIso + '\n' +
              'tags: []\n' +
              'mood: "' + (inpMood.value || '-') + '"\n' +
              'music: "' + (inpLagu.value.trim() || '-') + '"\n' +
              'album_art: "' + (inpAlbumArt.value.trim() || '-') + '"\n' +
              'image: "' + (gambarDataUrl || '-') + '"\n' +
              '---\n\n' +
              isiMentah;

            langkah('Menyimpan jurnal...');

            simpanJurnalKeGit(fileNama, md)
              .then(function () { sukses(fileNama); })
              .catch(function (err) { gagal(err); });
          }

        } catch (err) {
          feedback.innerHTML =
            '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Gagal: ' + err.message + '</p>';
          console.error('Gagal simpan jurnal: ' + err.message);
        }
      }

      var btnMic = document.getElementById('btn-mic');
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SpeechRecognition) {
        btnMic.disabled = false;
        var recognition = new SpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.continuous = false;
        recognition.interimResults = false;

        btnMic.addEventListener('click', function () {
          try {
            recognition.start();
            btnMic.classList.add('bg-red-100', 'border-red-400', 'text-red-600');
            btnMic.textContent = '🔴';
            btnMic.title = 'Merekam...';
            feedback.innerHTML = '<p class="text-blue-600 bg-blue-50 border border-blue-200 rounded p-3 text-sm">🎤 Dengarkan... bicara sekarang.</p>';
          } catch (e) {
            feedback.innerHTML = '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Gagal memulai mic: ' + e.message + '</p>';
          }
        });

        recognition.addEventListener('result', function (e) {
          var teks = e.results[0][0].transcript;
          isi.value += (isi.value ? ' ' : '') + teks;
          isi.focus();
          isi.selectionStart = isi.selectionEnd = isi.value.length;
          feedback.innerHTML = '<p class="text-green-700 bg-green-50 border border-green-200 rounded p-3 text-sm">✅ Voice: "' + teks + '"</p>';
        });

        recognition.addEventListener('end', function () {
          btnMic.classList.remove('bg-red-100', 'border-red-400', 'text-red-600');
          btnMic.textContent = '🎤';
          btnMic.title = 'Voice to text';
        });

        recognition.addEventListener('error', function (e) {
          btnMic.classList.remove('bg-red-100', 'border-red-400', 'text-red-600');
          btnMic.textContent = '🎤';
          btnMic.title = 'Voice to text';
          feedback.innerHTML = '<p class="text-red-600 bg-red-50 border border-red-200 rounded p-3 text-sm">Mic error: ' + e.error + '</p>';
        });
      }

      form.addEventListener('submit', simpanJurnal);
    })();
  </script>

</body>
</html>
